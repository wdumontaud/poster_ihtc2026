<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation 2</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --black: #111;
            --gray: #555;
            --light: #e8e8e8;
            --accent: #1a4f8a;
            --bg: #fafafa;
        }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg);
            color: var(--black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            border-bottom: 1px solid var(--light);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-tag {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            color: var(--accent);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
        }

        .nav-links a {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            color: var(--gray);
            text-decoration: none;
            padding: 0.3rem 0.7rem;
            border: 1px solid var(--light);
            border-radius: 2px;
            transition: border-color 0.2s, color 0.2s;
        }

        .nav-links a:hover { border-color: var(--accent); color: var(--accent); }
        .nav-links a.active { border-color: var(--accent); color: var(--accent); background: #f0f5fb; }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            gap: 1.5rem;
        }

        .meta {
            width: 100%;
            max-width: 860px;
            display: flex;
            align-items: baseline;
            gap: 1rem;
        }

        .anim-number {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            color: var(--gray);
            letter-spacing: 0.1em;
            white-space: nowrap;
        }

        h1 {
            font-size: 1rem;
            font-weight: 500;
            color: var(--black);
            letter-spacing: 0.01em;
        }

        .anim-frame {
            width: 100%;
            max-width: 860px;
            border: 1px solid var(--light);
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            min-height: 300px;
        }

        .anim-frame img {
            max-width: 100%;
            max-height: 72vh;
            display: block;
            transition: opacity 0.5s ease;
        }

        .caption {
            width: 100%;
            max-width: 860px;
            font-size: 0.78rem;
            color: var(--gray);
            line-height: 1.6;
            border-left: 2px solid var(--light);
            padding-left: 0.8rem;
            transition: opacity 0.5s ease;
        }

        footer {
            border-top: 1px solid var(--light);
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-text {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.62rem;
            color: #aaa;
            letter-spacing: 0.08em;
        }
    </style>
</head>
<body>

<header>
    <span class="header-tag">Poster — Animations</span>
    <nav class="nav-links">
        <a href="anim1.html">01</a>
        <a href="anim2.html" class="active">02</a>
        <a href="anim3.html">03</a>
    </nav>
</header>

<main>
    <div class="meta">
        <span class="anim-number">ANIM. 02 / 03</span>
        <h1 id="anim-title">Titre de l'animation 2</h1>
    </div>

    <div class="anim-frame">
        <img id="anim-image" src="fig/rue.png" alt="Animation étape 1">
    </div>

    <p class="caption" id="anim-caption">
        Description de l'animation 2 — à compléter.
    </p>
</main>

<footer>
    <span class="footer-text">Scan du QR code depuis le poster</span>
    <span class="footer-text">← → pour naviguer entre les animations</span>
</footer>

<script>
    // Configuration des étapes
    const steps = [
        {
            src: "fig/rue.png",
            title: "Vue d'ensemble de la rue",
            caption: "Voici la rue avec les bâtiments. Aucune information thermique n'est encore affichée."
        },
        {
            src: "fig/convection_exterieure.png",
            title: "Convection extérieure",
            caption: "Les flèches bleues montrent les flux de convection à l'extérieur des bâtiments."
        },
        {
            src: "fig/convection_interieure.png",
            title: "Convection intérieure",
            caption: "Ici, les flux de convection à l'intérieur des bâtiments sont mis en évidence."
        },
        {
            src: "fig/radiations.png",
            title: "Rayonnements thermiques",
            caption: "Les icônes de soleil représentent les sources de rayonnement thermique."
        }
    ];

    // Éléments du DOM
    const imageEl = document.getElementById("anim-image");
    const titleEl = document.getElementById("anim-title");
    const captionEl = document.getElementById("anim-caption");

    // Index de l'étape actuelle
    let currentStep = 0;

    // Fonction pour mettre à jour l'affichage
    function updateStep() {
        const step = steps[currentStep];
        imageEl.src = step.src;
        titleEl.textContent = step.title;
        captionEl.textContent = step.caption;

        // Animation de transition (optionnel)
        imageEl.style.opacity = 0.5;
        captionEl.style.opacity = 0.5;
        setTimeout(() => {
            imageEl.style.opacity = 1;
            captionEl.style.opacity = 1;
        }, 100);
    }

    // Changer d'étape toutes les 20 secondes
    function startSlideshow() {
        updateStep();
        setInterval(() => {
            currentStep = (currentStep + 1) % steps.length;
            updateStep();
        }, 20000); // 20 000 ms = 20 secondes
    }

    // Navigation clavier
    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft') location.href = 'anim1.html';
        if (e.key === 'ArrowRight') location.href = 'anim3.html';
    });

    // Démarrer le diaporama
    startSlideshow();
</script>

</body>
</html>
